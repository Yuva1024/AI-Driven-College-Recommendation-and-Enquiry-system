{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 pt-4">
    <div class="col-lg-5 col-md-7 col-sm-10">
        
        <div class="content-card p-4 p-md-5">
            <!-- Header Section -->
            <div class="text-center mb-5">
                <div class="mb-3 mx-auto" style="width: 70px; height: 70px; background: rgba(0, 105, 92, 0.08); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="var(--primary-green)" class="bi bi-person-plus-fill" viewBox="0 0 16 16">
                        <path d="M1 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1H1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                        <path fill-rule="evenodd" d="M13.5 5a.5.5 0 0 1 .5.5V7h1.5a.5.5 0 0 1 0 1H14v1.5a.5.5 0 0 1-1 0V8h-1.5a.5.5 0 0 1 0-1H13V5.5a.5.5 0 0 1 .5-.5z"/>
                    </svg>
                </div>
                <h3 class="fw-bold mb-2" style="color: var(--text-dark);">Create Account</h3>
                <p class="text-muted" style="font-size: 0.95rem;">Join to save your prediction history and access exclusive insights.</p>
            </div>

            <!-- Form Section -->
            <form method="post">
                <div class="mb-4">
                    <label class="form-label fw-medium">Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="Choose a unique username" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-medium">
                        Email <small class="text-muted fw-normal">(Optional)</small>
                    </label>
                    <input type="email" name="email" class="form-control form-control-lg" placeholder="example@email.com">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-medium">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Create a strong password" required>
                </div>

                <div class="d-grid mt-5">
                    <button class="btn btn-primary btn-lg">
                        Create Account
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-check-circle ms-2" viewBox="0 0 16 16">
                            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                            <path d="M10.97 4.97a.235.235 0 0 0-.02.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05z"/>
                        </svg>
                    </button>
                </div>
            </form>

            <!-- Footer Section -->
            <div class="text-center mt-4 pt-4" style="border-top: 1px solid #eee;">
                <p class="text-muted mb-0">
                    Already have an account? 
                    <a href="{{ url_for('login') }}" class="fw-semibold" style="color: var(--primary-green); text-decoration: none;">
                        Login here
                    </a>
                </p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
