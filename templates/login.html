{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 pt-4">
    <div class="col-lg-5 col-md-7 col-sm-10">
        
        <div class="content-card p-4 p-md-5">
            <!-- Header Section -->
            <div class="text-center mb-5">
                <div class="mb-3 mx-auto" style="width: 70px; height: 70px; background: rgba(0, 105, 92, 0.08); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="var(--primary-green)" class="bi bi-person-badge" viewBox="0 0 16 16">
                        <path d="M6.5 2a.5.5 0 0 0 0 1h3a.5.5 0 0 0 0-1h-3zM11 8a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                        <path d="M0 4.5A1.5 1.5 0 0 1 1.5 3h13A1.5 1.5 0 0 1 16 4.5V6a.5.5 0 0 1-.5.5 1.5 1.5 0 0 0 0 3 .5.5 0 0 1 .5.5v1.5a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 11.5V10a.5.5 0 0 1 .5-.5 1.5 1.5 0 1 0 0-3A.5.5 0 0 1 0 6V4.5zM1.5 4a.5.5 0 0 0-.5.5v1.05a2.5 2.5 0 0 1 0 4.9v1.05a.5.5 0 0 0 .5.5h13a.5.5 0 0 0 .5-.5v-1.05a2.5 2.5 0 0 1 0-4.9V4.5a.5.5 0 0 0-.5-.5h-13z"/>
                    </svg>
                </div>
                <h3 class="fw-bold mb-2" style="color: var(--text-dark);">Welcome Back</h3>
                <p class="text-muted" style="font-size: 0.95rem;">Login to access your dashboard and saved predictions</p>
            </div>

            <!-- Form Section -->
            <form method="post">
                <div class="mb-4">
                    <label class="form-label fw-medium">Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter your username" required autofocus>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-medium">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter your password" required>
                </div>

                <div class="d-grid mt-5">
                    <button class="btn btn-primary btn-lg">
                        Login
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-arrow-right ms-2" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/>
                        </svg>
                    </button>
                </div>
            </form>

            <!-- Footer Section -->
            <div class="text-center mt-4 pt-4" style="border-top: 1px solid #eee;">
                <p class="text-muted mb-0">
                    New to TNEA Predictor? 
                    <a href="{{ url_for('register') }}" class="fw-semibold" style="color: var(--primary-green); text-decoration: none;">
                        Create an account
                    </a>
                </p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
